version: '3.8'

services:
  # 1. Container Cơ sở dữ liệu MySQL
  mysql-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: huy2406  # Nhập đúng mật khẩu giống trong DBConnection
      MYSQL_DATABASE: quanly_thuchi
    ports:
      - "3307:3306" # Mở cổng 3307 để không bị trùng với MySQL 
    volumes:
      - db_data:/var/lib/mysql # Giữ lại dữ liệu kể cả khi tắt Docker

  # 2. Container Ứng dụng Web Java
  web-app:
    build: . # Build file Dockerfile ở thư mục hiện tại
    ports:
      - "8083:8080" # Cổng truy cập Web
    environment:
      - DB_HOST=mysql-db # Truyền tên container DB vào biến môi trường cho Java
    depends_on:
      - mysql-db # Chờ DB chạy lên trước rồi mới chạy Web

volumes:
  db_data: